# build.yml — the FAST pipeline (every 3 hours): fetch matches + squads,
# join market values, and deploy the static site to GitHub Pages.
#
# Layout A: everything lives at the repo root, so paths need NO prefix.
# scripts/build_data.py and site/ are found directly.

name: Build and deploy World Cup site

on:
  schedule:
    - cron: "0 */3 * * *"     # every 3 hours (UTC)
  push:
    branches: [main]           # also rebuild on any code change
  workflow_dispatch:           # manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

# Prevents two deployments from racing each other (the "Deployment failed,
# try again later" error). New runs queue instead of colliding.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch match data
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/build_data.py

      - name: Upload the site folder as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
