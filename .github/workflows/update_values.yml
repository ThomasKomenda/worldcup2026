# update_values.yml — the SLOW pipeline (weekly): extract player market
# values from the transfermarkt-datasets project and commit values.json.
#
# Layout A: root-relative paths, no prefix needed.

name: Update market values (weekly)

on:
  schedule:
    - cron: "0 6 * * 1"        # Mondays 06:00 UTC
  workflow_dispatch:            # manual button — run this once first!

permissions:
  contents: write               # needs to push a commit

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install DuckDB
        run: pip install duckdb

      - name: Extract market values
        run: python scripts/extract_values.py

      - name: Commit the updated values file
        run: |
          git config user.name "values-bot"
          git config user.email "actions@github.com"
          git add site/data/values.json
          git diff --cached --quiet || git commit -m "Update market values"
          git push
