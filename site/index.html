<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 — Fixtures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@125,700..900&display=swap" rel="stylesheet" />
  <style>
    :root { --pitch:#0a5c36; --pitch-dark:#063d24; --ink:#14201a; --paper:#f6f8f4; --card:#fff; --line:#d8e2d8; --muted:#5c6b60; --live:#d62839; }
    * { box-sizing:border-box; margin:0; }
    body { font-family:system-ui,-apple-system,"Segoe UI",sans-serif; background:var(--paper); color:var(--ink); line-height:1.5; }
    header { background:var(--pitch); color:#fff; padding:28px 20px 22px; }
    .wrap { max-width:760px; margin:0 auto; }
    h1 { font-family:"Archivo",system-ui,sans-serif; font-stretch:125%; font-weight:900; font-size:clamp(1.6rem,5vw,2.4rem); text-transform:uppercase; }
    .tz-chip { display:inline-block; margin-top:8px; padding:3px 10px; border:1px solid rgba(255,255,255,.5); border-radius:999px; font-size:.8rem; }
    nav { display:flex; gap:8px; margin:20px 0 8px; flex-wrap:wrap; }
    .tab { font:inherit; padding:8px 18px; border:1px solid var(--line); border-radius:999px; background:var(--card); cursor:pointer; }
    .tab[aria-selected="true"] { background:var(--pitch); border-color:var(--pitch); color:#fff; font-weight:600; }
    .tab:focus-visible { outline:3px solid var(--pitch); outline-offset:2px; }
    main { padding:0 20px 60px; }
    .date-heading { margin:26px 0 10px; font-size:.85rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
    .match { display:grid; grid-template-columns:86px 1fr; gap:16px; align-items:center; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px; cursor:pointer; width:100%; text-align:left; font:inherit; color:inherit; }
    .match:hover { border-color:var(--pitch); }
    .kickoff { font-family:"Archivo",system-ui,sans-serif; font-stretch:125%; font-weight:800; font-size:1.5rem; font-variant-numeric:tabular-nums; color:var(--pitch-dark); text-align:center; }
    .kickoff small { display:block; font-size:.65rem; color:var(--muted); font-weight:600; }
    .teams { font-size:1.05rem; }
    .teams .score { font-weight:800; color:var(--pitch-dark); padding:0 6px; }
    .meta { font-size:.8rem; color:var(--muted); margin-top:2px; }
    .hint { font-size:.75rem; color:var(--muted); }
    /* live badge: a small pulsing dot that says a match is happening now */
    .live-badge { display:inline-flex; align-items:center; gap:5px; color:var(--live); font-weight:800; font-size:.7rem; letter-spacing:.05em; }
    .live-dot { width:8px; height:8px; border-radius:50%; background:var(--live); animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.25;} }
    @media (prefers-reduced-motion: reduce) { .live-dot { animation:none; } }
    /* countdown pill on upcoming matches */
    .countdown { font-variant-numeric:tabular-nums; font-weight:700; color:var(--pitch); font-size:.8rem; }
    .detail { background:var(--card); border:1px solid var(--pitch); border-radius:12px; padding:16px; margin:-4px 0 12px; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    @media (max-width:560px){ .detail-grid { grid-template-columns:1fr; } }
    .squad h3 { font-family:"Archivo",system-ui,sans-serif; font-stretch:125%; font-weight:800; font-size:1rem; text-transform:uppercase; }
    .total { font-size:.8rem; color:var(--pitch-dark); font-weight:700; margin-bottom:8px; }
    .player { display:flex; justify-content:space-between; gap:8px; padding:5px 0; border-bottom:1px solid var(--line); font-size:.85rem; }
    .player:last-child { border-bottom:none; }
    .pname { font-weight:600; } .pclub { color:var(--muted); font-size:.75rem; }
    .pvalue { font-variant-numeric:tabular-nums; font-weight:700; color:var(--pitch-dark); white-space:nowrap; }
    .squad-list { max-height:340px; overflow-y:auto; }
    .footnote { font-size:.72rem; color:var(--muted); margin-top:12px; }
    /* standings tables */
    .group { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:12px; }
    .group h3 { font-family:"Archivo",system-ui,sans-serif; font-stretch:125%; font-size:.95rem; text-transform:uppercase; margin-bottom:6px; }
    table { width:100%; border-collapse:collapse; font-size:.85rem; }
    th, td { text-align:right; padding:4px 6px; }
    th:first-child, td:first-child { text-align:left; }
    thead th { font-size:.68rem; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--line); }
    tbody tr:not(:last-child) td { border-bottom:1px solid var(--line); }
    .qualified { color:var(--pitch); font-weight:800; }
    .notice { background:#fff7e0; border:1px solid #e8d48a; border-radius:10px; padding:10px 14px; margin-top:18px; font-size:.9rem; }
    footer { padding:20px; text-align:center; font-size:.8rem; color:var(--muted); }
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>World Cup 2026</h1>
    <span class="tz-chip" id="tz-chip">detecting your timezone…</span>
  </div>
</header>
<main class="wrap">
  <div id="sample-notice"></div>
  <nav role="tablist" aria-label="Views">
    <button class="tab" role="tab" id="tab-upcoming" aria-selected="true"  onclick="show('upcoming')">Upcoming</button>
    <button class="tab" role="tab" id="tab-finished" aria-selected="false" onclick="show('finished')">Results</button>
    <button class="tab" role="tab" id="tab-standings" aria-selected="false" onclick="show('standings')">Standings</button>
  </nav>
  <section id="list"></section>
</main>
<footer>Data: football-data.org &amp; transfermarkt-datasets · rebuilt automatically</footer>

<script>
let data = { upcoming:[], finished:[] };
let squads = null, standings = null;
let currentTab = "upcoming";
let openMatchId = null;
let tickTimer = null;      // countdown interval
let refreshTimer = null;   // live-refresh interval

const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
document.getElementById("tz-chip").textContent = "Kickoff times in your local time · " + timeZone;
const timeFmt = new Intl.DateTimeFormat(undefined, { hour:"2-digit", minute:"2-digit" });
const dayFmt  = new Intl.DateTimeFormat(undefined, { weekday:"long", month:"long", day:"numeric" });

function fmtValue(v){ if(v==null) return "—"; return "€"+(v/1e6).toFixed(v>=10e6?0:1)+"M"; }

/* Turn a future UTC time into "2h 14m" / "12m 03s". Pure browser math on the
   UTC value we already store — no data source needed. */
function countdownText(utc){
  const diff = new Date(utc) - new Date();
  if (diff <= 0) return null;
  const h = Math.floor(diff/3.6e6), m = Math.floor(diff%3.6e6/6e4), s = Math.floor(diff%6e4/1000);
  if (h > 0) return h+"h "+String(m).padStart(2,"0")+"m";
  return m+"m "+String(s).padStart(2,"0")+"s";
}

async function load(){
  try { data = await (await fetch("data/matches.json?t="+Date.now())).json(); }
  catch(e){ document.getElementById("list").innerHTML="<p class='notice'>Could not load match data. Serve the folder with <code>python -m http.server</code>.</p>"; return; }
  try { squads = (await (await fetch("data/squads.json?t="+Date.now())).json()).teams; } catch(e){ squads=null; }
  try { standings = (await (await fetch("data/standings.json?t="+Date.now())).json()).standings; } catch(e){ standings=null; }
  if (data.sample) document.getElementById("sample-notice").innerHTML="<p class='notice'><strong>Sample data.</strong> Run the build workflow for real fixtures.</p>";
  render();
  startTimers();
}

/* Two timers:
   - tick every second so countdowns feel alive (cheap, browser-only)
   - re-fetch matches.json every 60s IF something is live, so scores update
     without the visitor refreshing. We only poll when a match is in play —
     no point hammering the file overnight. */
function startTimers(){
  if (tickTimer) clearInterval(tickTimer);
  tickTimer = setInterval(updateCountdowns, 1000);
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(async () => {
    const anyLive = (data.upcoming||[]).some(m => m.status==="IN_PLAY" || m.status==="PAUSED");
    if (anyLive) {
      try { data = await (await fetch("data/matches.json?t="+Date.now())).json(); render(); } catch(e){}
    }
  }, 60000);
}

/* Update just the countdown spans in place, without re-rendering everything
   (re-rendering every second would fight the user's scrolling). */
function updateCountdowns(){
  document.querySelectorAll("[data-countdown]").forEach(el => {
    const t = countdownText(el.getAttribute("data-countdown"));
    el.textContent = t ? ("starts in "+t) : "starting…";
  });
}

function show(tab){
  currentTab = tab; openMatchId = null;
  ["upcoming","finished","standings"].forEach(t =>
    document.getElementById("tab-"+t).setAttribute("aria-selected", tab===t));
  render();
}
function toggle(id){ openMatchId = (openMatchId===id)?null:id; render(); }

function squadColumn(teamName){
  const squad = squads && squads[teamName];
  if(!squad) return "<div class='squad'><h3>"+teamName+"</h3><p class='hint'>Squad data appears after the next build.</p></div>";
  const total = squad.players.reduce((s,p)=>s+(p.value_eur||0),0);
  const rows = squad.players.map(p =>
    "<div class='player'><span><span class='pname'>"+p.name+"</span>"+
    (p.club?"<br><span class='pclub'>"+p.club+"</span>":"")+"</span>"+
    "<span class='pvalue'>"+fmtValue(p.value_eur)+"</span></div>").join("");
  return "<div class='squad'><h3>"+teamName+"</h3><div class='total'>Squad value: "+fmtValue(total)+
         " · "+squad.matched+"/"+squad.squadSize+" valued</div><div class='squad-list'>"+rows+"</div></div>";
}
function detailPanel(m){
  return "<div class='detail'><div class='detail-grid'>"+squadColumn(m.home)+squadColumn(m.away)+"</div>"+
         "<p class='footnote'>Squad lists, not confirmed lineups — official XIs drop ~1h before kickoff. "+
         "Values: Transfermarkt community dataset (CC0), weekly; unmatched show “—”.</p></div>";
}

function renderMatches(){
  const matches = data[currentTab]||[];
  const list = document.getElementById("list");
  if(!matches.length){ list.innerHTML="<p class='notice'>No matches in this window.</p>"; return; }
  let html="", lastDay="";
  for(const m of matches){
    const kickoff = new Date(m.utcDate);
    const day = dayFmt.format(kickoff);
    if(day!==lastDay){ html+="<h2 class='date-heading'>"+day+"</h2>"; lastDay=day; }
    const isLive = m.status==="IN_PLAY" || m.status==="PAUSED";

    // middle column: live/finished show score, upcoming shows vs
    let middle;
    if(isLive) middle = m.home+" <span class='score'>"+(m.homeScore??0)+" – "+(m.awayScore??0)+"</span> "+m.away+" <span class='live-badge'><span class='live-dot'></span>LIVE</span>";
    else if(currentTab==="finished") middle = m.home+" <span class='score'>"+m.homeScore+" – "+m.awayScore+"</span> "+m.away;
    else middle = m.home+" <strong>vs</strong> "+m.away;

    // top-left cell: for upcoming, a live-updating countdown under the time
    let cd = "";
    if(currentTab==="upcoming" && !isLive){
      const t = countdownText(m.utcDate);
      if(t) cd = "<div class='countdown' data-countdown='"+m.utcDate+"'>starts in "+t+"</div>";
    }

    html += "<button class='match' onclick='toggle("+m.id+")'>"+
      "<div class='kickoff'>"+timeFmt.format(kickoff)+"<small>"+(currentTab==="finished"?"FULL TIME":(isLive?"LIVE":"KICKOFF"))+"</small></div>"+
      "<div><div class='teams'>"+middle+"</div>"+cd+
      "<div class='meta'>"+(m.stage?m.stage.replaceAll("_"," ").toLowerCase():"")+(m.venue?" · "+m.venue:"")+
      " · <span class='hint'>"+(openMatchId===m.id?"click to close":"squads & values")+"</span></div></div></button>";
    if(openMatchId===m.id) html += detailPanel(m);
  }
  list.innerHTML = html;
}

function renderStandings(){
  const list = document.getElementById("list");
  if(!standings || !standings.length){
    list.innerHTML="<p class='notice'>Standings appear after the next build (or aren't published for the current stage).</p>"; return;
  }
  let html="";
  for(const group of standings){
    const table = group.table || [];
    html += "<div class='group'><h3>"+(group.group ? group.group.replaceAll("_"," ") : "Table")+"</h3>"+
      "<table><thead><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead><tbody>"+
      table.map((row,i)=>{
        const q = i<2 ? " class='qualified'" : "";
        return "<tr><td"+q+">"+row.team.name+"</td><td>"+row.playedGames+"</td><td>"+row.won+"</td>"+
               "<td>"+row.draw+"</td><td>"+row.lost+"</td><td>"+row.goalDifference+"</td><td"+q+">"+row.points+"</td></tr>";
      }).join("")+"</tbody></table></div>";
  }
  list.innerHTML = html;
}

function render(){ currentTab==="standings" ? renderStandings() : renderMatches(); }

load();
</script>
</body>
</html>
