<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 · Matchday</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=Archivo+Narrow:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --night: #0b1020; --panel: #141b30; --panel-2: #1c2740; --line: #2a3550;
      --chalk: #f2f5ff; --dim: #8a97b8; --lime: #c8ff3d;
      --pitch-a: #1f7a43; --pitch-b: #23884a; --live: #ff4d5e;
    }
    * { box-sizing: border-box; margin: 0; }
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--night); color: var(--chalk); line-height: 1.5; -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 820px; margin: 0 auto; padding: 0 20px; }
    header { border-bottom: 1px solid var(--line);
      background: radial-gradient(120% 100% at 50% -20%, #16203a 0%, var(--night) 60%); }
    .head-inner { padding: 30px 20px 24px; max-width: 820px; margin: 0 auto; }
    .kicker { font-family: "Archivo Narrow", sans-serif; text-transform: uppercase;
      letter-spacing: 0.25em; font-size: 0.72rem; color: var(--lime); font-weight: 700; }
    h1 { font-family: "Archivo", sans-serif; font-weight: 900; line-height: 0.92;
      font-size: clamp(2.2rem, 8vw, 3.6rem); letter-spacing: -0.01em; margin-top: 6px; }
    h1 .yr { color: var(--lime); }
    .tz { margin-top: 12px; font-size: 0.8rem; color: var(--dim); }
    .tz b { color: var(--chalk); font-weight: 600; }
    .head-meta { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 14px; }
    .updated { font-family: "Archivo Narrow", sans-serif; text-transform: uppercase; letter-spacing: 0.06em;
      font-size: 0.7rem; color: var(--dim); }
    .share-btn { font-family: "Archivo Narrow", sans-serif; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; font-size: 0.72rem; padding: 6px 14px; border: 1px solid var(--lime);
      border-radius: 20px; background: transparent; color: var(--lime); cursor: pointer; }
    .share-btn:active { background: var(--lime); color: #0b1020; }
    .share-btn:focus-visible { outline: 2px solid var(--lime); outline-offset: 2px; }
    /* mismatch meter */
    .mismatch { margin-top: 8px; font-size: 0.8rem; color: var(--chalk); }
    .mismatch b { color: var(--lime); }
    .mismatch.even { color: var(--dim); }
    nav { display: flex; gap: 6px; margin: 22px 0 6px; flex-wrap: wrap; }
    .tab { font-family: "Archivo Narrow", sans-serif; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; font-size: 0.85rem; padding: 9px 16px; border: 1px solid var(--line);
      border-radius: 4px; background: var(--panel); color: var(--dim); cursor: pointer; }
    .tab[aria-selected="true"] { background: var(--lime); color: #0b1020; border-color: var(--lime); }
    .tab:focus-visible { outline: 2px solid var(--lime); outline-offset: 2px; }
    main { padding: 8px 0 80px; }
    .daylabel { font-family: "Archivo Narrow", sans-serif; text-transform: uppercase;
      letter-spacing: 0.12em; font-size: 0.75rem; color: var(--dim); margin: 24px 0 10px;
      padding-bottom: 6px; border-bottom: 1px solid var(--line); }
    /* team filter */
    .filterbar { display: flex; align-items: center; gap: 10px; margin: 14px 0 4px; }
    .filter-lbl { font-family: "Archivo Narrow", sans-serif; text-transform: uppercase;
      letter-spacing: 0.08em; font-size: 0.72rem; color: var(--dim); }
    .team-select { font: inherit; font-size: 0.9rem; background: var(--panel); color: var(--chalk);
      border: 1px solid var(--line); border-radius: 6px; padding: 7px 10px; cursor: pointer; }
    .team-select:focus-visible { outline: 2px solid var(--lime); }
    .clear-filter { font-family: "Archivo Narrow", sans-serif; text-transform: uppercase; font-size: 0.72rem;
      background: none; border: none; color: var(--lime); cursor: pointer; letter-spacing: 0.06em; }
    .match { display: grid; grid-template-columns: 62px 1fr auto; gap: 14px; align-items: center;
      width: 100%; text-align: left; font: inherit; color: inherit; background: var(--panel);
      border: 1px solid var(--line); border-radius: 8px; padding: 13px 15px; margin-bottom: 8px;
      cursor: pointer; transition: border-color .15s, transform .15s; }
    .match:hover { border-color: var(--lime); transform: translateX(2px); }
    .match:focus-visible { outline: 2px solid var(--lime); outline-offset: 2px; }
    .clock { font-family: "Archivo", sans-serif; font-weight: 800; font-size: 1.35rem;
      font-variant-numeric: tabular-nums; text-align: center; letter-spacing: -0.02em; }
    .clock small { display: block; font-family: "Archivo Narrow", sans-serif; font-size: 0.58rem;
      letter-spacing: 0.1em; color: var(--dim); font-weight: 700; margin-top: 2px; }
    .fixture { font-size: 1.05rem; font-weight: 600; }
    .fixture .vs { color: var(--dim); font-weight: 400; padding: 0 6px; }
    .score { font-family: "Archivo", sans-serif; font-weight: 900; font-variant-numeric: tabular-nums;
      color: var(--lime); padding: 0 8px; }
    .sub { font-family: "Archivo Narrow", sans-serif; text-transform: uppercase; letter-spacing: 0.06em;
      font-size: 0.72rem; color: var(--dim); margin-top: 3px; }
    .cd { color: var(--lime); font-variant-numeric: tabular-nums; }
    .livewrap { display: inline-flex; align-items: center; gap: 5px; color: var(--live);
      font-family: "Archivo Narrow", sans-serif; font-weight: 700; font-size: 0.72rem; letter-spacing: 0.08em; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--live); animation: pulse 1.3s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @media (prefers-reduced-motion: reduce){ .dot{animation:none} }
    .chev { color: var(--dim); font-size: 1.2rem; }

    .detail { background: var(--panel); border: 1px solid var(--lime); border-radius: 8px;
      margin: -2px 0 10px; overflow: hidden; }
    .detail-head { display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; border-bottom: 1px solid var(--line); gap: 10px; flex-wrap: wrap; }
    .detail-head .venue { font-family: "Archivo Narrow", sans-serif; text-transform: uppercase;
      letter-spacing: 0.08em; font-size: 0.75rem; color: var(--dim); }
    .switchrow { display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px 0; gap: 10px; flex-wrap: wrap; }
    .teamtabs, .viewtabs { display: flex; gap: 6px; }
    .teamtab, .viewtab { font-family: "Archivo Narrow", sans-serif; font-weight: 700; font-size: 0.8rem;
      text-transform: uppercase; padding: 5px 12px; border-radius: 4px; cursor: pointer;
      border: 1px solid var(--line); background: var(--panel-2); color: var(--dim); }
    .teamtab[aria-selected="true"], .viewtab[aria-selected="true"] { background: var(--lime); color: #0b1020; border-color: var(--lime); }
    .pitch-note { padding: 8px 16px 0; font-family: "Archivo Narrow", sans-serif; font-size: 0.72rem;
      letter-spacing: 0.04em; color: var(--dim); text-transform: uppercase; }
    /* squad value comparison bar */
    .vbar-wrap { padding: 12px 16px 4px; }
    .vbar-heads { display: flex; justify-content: space-between; font-family: "Archivo", sans-serif;
      font-weight: 800; font-size: 0.85rem; color: var(--chalk); margin-bottom: 5px; font-variant-numeric: tabular-nums; }
    .vbar { height: 8px; border-radius: 4px; background: var(--panel-2); overflow: hidden; display: flex; }
    .vbar-h { height: 100%; background: var(--lime); }

    .pitch { position: relative; margin: 12px 16px 16px; border-radius: 10px;
      background: repeating-linear-gradient(180deg, var(--pitch-a) 0 44px, var(--pitch-b) 44px 88px);
      border: 2px solid rgba(255,255,255,0.18); aspect-ratio: 3 / 4; display: flex; flex-direction: column;
      justify-content: space-between; padding: 18px 6px; overflow: hidden; }
    .center-circle { position: absolute; left: 50%; top: 50%; width: 90px; height: 90px;
      transform: translate(-50%,-50%); border: 2px solid rgba(255,255,255,0.15); border-radius: 50%; }
    .halfway { position: absolute; left: 0; right: 0; top: 50%; height: 2px; background: rgba(255,255,255,0.15); }
    .line { display: flex; justify-content: space-around; align-items: flex-start; position: relative; z-index: 2; }
    .pl { width: 72px; text-align: center; }
    .badge { width: 42px; height: 42px; margin: 0 auto 4px; border-radius: 50%; background: var(--night);
      border: 2px solid var(--lime); display: flex; align-items: center; justify-content: center;
      font-family: "Archivo", sans-serif; font-weight: 800; font-size: 0.9rem; color: var(--lime); }
    .pl .nm { font-size: 0.64rem; font-weight: 600; line-height: 1.2; }
    .pl .val { font-family: "Archivo Narrow", sans-serif; font-size: 0.62rem; color: var(--lime); font-variant-numeric: tabular-nums; }
    .pl .club { font-family: "Archivo Narrow", sans-serif; font-size: 0.58rem; color: rgba(242,245,255,0.6); line-height: 1.15; }

    /* list view table */
    .plist { margin: 4px 4px 8px; }
    .plist table { width: 100%; border-collapse: collapse; }
    .plist th { font-family: "Archivo Narrow", sans-serif; text-transform: uppercase; font-size: 0.68rem;
      letter-spacing: 0.05em; color: var(--dim); text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); }
    .plist th.r, .plist td.r { text-align: right; }
    .plist td { padding: 8px 10px; font-size: 0.85rem; border-bottom: 1px solid var(--line); vertical-align: top; }
    .plist tr:last-child td { border-bottom: none; }
    .plist .p-nm { font-weight: 600; }
    .plist .p-pos { font-family: "Archivo Narrow", sans-serif; font-size: 0.68rem; text-transform: uppercase;
      color: var(--dim); letter-spacing: 0.04em; }
    .plist .p-club { color: var(--dim); font-size: 0.8rem; }
    .plist .p-val { font-family: "Archivo", sans-serif; font-weight: 800; color: var(--lime);
      font-variant-numeric: tabular-nums; white-space: nowrap; }

    .squadmeta { padding: 0 16px 16px; display: flex; justify-content: space-between;
      font-family: "Archivo Narrow", sans-serif; font-size: 0.75rem; color: var(--dim);
      text-transform: uppercase; letter-spacing: 0.05em; }
    .squadmeta b { color: var(--lime); }

    .section-label { font-family: "Archivo", sans-serif; font-weight: 800; font-size: 1.1rem;
      text-transform: uppercase; letter-spacing: 0.02em; margin: 26px 0 12px; color: var(--chalk); }
    .section-label:first-child { margin-top: 8px; }
    .grp { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
    .grp h3 { font-family: "Archivo Narrow", sans-serif; text-transform: uppercase; letter-spacing: 0.08em;
      font-size: 0.85rem; color: var(--lime); margin-bottom: 8px; }
    table.st { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    table.st th, table.st td { padding: 5px 6px; text-align: right; }
    table.st th:first-child, table.st td:first-child { text-align: left; }
    table.st thead th { font-family: "Archivo Narrow", sans-serif; text-transform: uppercase; font-size: 0.68rem;
      letter-spacing: 0.05em; color: var(--dim); border-bottom: 1px solid var(--line); font-weight: 700; }
    table.st tbody tr:not(:last-child) td { border-bottom: 1px solid var(--line); }
    td.pts { font-family: "Archivo", sans-serif; font-weight: 800; color: var(--chalk); }
    .qual td:first-child { color: var(--lime); font-weight: 700; }
    .qual td:first-child::before { content: "▸ "; color: var(--lime); }

    /* tournament sub-tabs */
    .subtabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0 16px; }
    .subtab { font-family: "Archivo Narrow", sans-serif; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; font-size: 0.78rem; padding: 7px 13px; border: 1px solid var(--line);
      border-radius: 20px; background: var(--panel); color: var(--dim); cursor: pointer; }
    .subtab[aria-selected="true"] { background: var(--panel-2); color: var(--lime); border-color: var(--lime); }
    /* potential matchups */
    .potential { margin-top: 16px; padding: 14px; background: var(--panel);
      border: 1px dashed var(--line); border-radius: 8px; }
    .pot-label { font-family: "Archivo Narrow", sans-serif; text-transform: uppercase; letter-spacing: 0.06em;
      font-size: 0.72rem; color: var(--dim); margin-bottom: 8px; }
    .pot-chip { display: inline-block; font-size: 0.82rem; padding: 4px 10px; margin: 0 6px 6px 0;
      background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; color: var(--chalk); }

    /* knockout match row (compact) */
    .ko { display: flex; justify-content: space-between; align-items: center; background: var(--panel);
      border: 1px solid var(--line); border-radius: 6px; padding: 10px 14px; margin-bottom: 6px; }
    .ko .vs { color: var(--dim); font-weight: 400; padding: 0 4px; }
    /* spacious bracket cards for projected rounds */
    .bracket-card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
      padding: 14px; margin-bottom: 12px; }
    .bracket-card.firm-card { border-color: var(--lime); }
    .bracket-status { font-family: "Archivo Narrow", sans-serif; text-transform: uppercase;
      letter-spacing: 0.08em; font-size: 0.68rem; color: var(--dim); margin-bottom: 12px; }
    .firm-card .bracket-status { color: var(--lime); }
    .bracket-sides { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: start; }
    .bracket-vs { align-self: center; font-family: "Archivo", sans-serif; font-weight: 800;
      color: var(--dim); font-size: 0.9rem; }
    .side-block { background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
    .side-block.firm { border-color: var(--lime); background: rgba(200,255,61,0.06); }
    .side-cap { font-family: "Archivo Narrow", sans-serif; text-transform: uppercase; letter-spacing: 0.06em;
      font-size: 0.62rem; color: var(--dim); margin-bottom: 6px; }
    .side-team { font-size: 0.9rem; font-weight: 600; padding: 3px 0; line-height: 1.3; }
    .side-block.firm .side-team { color: var(--lime); }
    .side-block.maybe .side-team { color: var(--chalk); opacity: 0.85; font-weight: 500; }
    .side-block.tbd .side-team { color: var(--line); }
    @media (max-width: 480px) {
      .bracket-sides { grid-template-columns: 1fr; gap: 8px; }
      .bracket-vs { text-align: center; padding: 2px 0; }
    }
    .ko .teams { font-weight: 600; font-size: 0.95rem; }
    .ko .rs { font-family: "Archivo", sans-serif; font-weight: 900; color: var(--lime); font-variant-numeric: tabular-nums; }
    .ko .dt { font-family: "Archivo Narrow", sans-serif; font-size: 0.72rem; color: var(--dim); text-transform: uppercase; }

    .notice { background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--lime);
      border-radius: 6px; padding: 12px 15px; font-size: 0.9rem; color: var(--dim); margin-top: 16px; }
    footer { border-top: 1px solid var(--line); padding: 22px 20px; text-align: center;
      font-family: "Archivo Narrow", sans-serif; font-size: 0.75rem; color: var(--dim);
      text-transform: uppercase; letter-spacing: 0.08em; }

    /* mobile tuning: tighten grid, ensure tap targets, prevent overflow */
    @media (max-width: 480px) {
      .wrap, .head-inner { padding-left: 14px; padding-right: 14px; }
      .match { grid-template-columns: 54px 1fr auto; gap: 10px; padding: 12px 12px; }
      .clock { font-size: 1.2rem; }
      .fixture { font-size: 0.98rem; }
      .tab { padding: 8px 13px; font-size: 0.8rem; }
      .pl { width: 62px; }
      .pl .nm { font-size: 0.6rem; }
      .team-select { max-width: 60vw; }
      .detail-head { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>
<header>
  <div class="head-inner">
    <div class="kicker">Canada · Mexico · USA</div>
    <h1>World Cup <span class="yr">'26</span></h1>
    <div class="tz" id="tz">Kickoff times shown in your local time</div>
    <div class="head-meta">
      <span class="updated" id="updated"></span>
      <button class="share-btn" onclick="shareSite()" aria-label="Share this site">Share</button>
    </div>
  </div>
</header>
<div class="wrap">
  <div id="notice-slot"></div>
  <nav role="tablist" aria-label="Views">
    <button class="tab" role="tab" id="tab-upcoming" aria-selected="true" onclick="show('upcoming')">Upcoming</button>
    <button class="tab" role="tab" id="tab-finished" aria-selected="false" onclick="show('finished')">Results</button>
    <button class="tab" role="tab" id="tab-tournament" aria-selected="false" onclick="show('tournament')">Tournament</button>
  </nav>
  <main id="view"></main>
</div>
<footer>Data · football-data.org &amp; transfermarkt-datasets · rebuilt every few hours</footer>

<script>
let data = { upcoming: [], finished: [] };
let squads = null, standings = null;
let tab = "upcoming";
let subRound = null;
let teamFilter = null;
let openId = null;
let openTeam = {}, openMode = {};
let tick = null, poll = null;

// Remember the last tab + team filter across visits. localStorage works on the
// deployed GitHub Pages site (not in sandboxed previews) — that's expected.
function saveState(){
  try { localStorage.setItem("wc26", JSON.stringify({tab, teamFilter})); } catch(e){}
}
function loadState(){
  try { const s = JSON.parse(localStorage.getItem("wc26")||"{}");
    if(s.tab) tab = s.tab; if(s.teamFilter) teamFilter = s.teamFilter; } catch(e){}
}

const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
document.getElementById("tz").innerHTML = "Kickoff times in your local time · <b>" + tz + "</b>";
const tFmt = new Intl.DateTimeFormat(undefined, { hour: "2-digit", minute: "2-digit" });
const dFmt = new Intl.DateTimeFormat(undefined, { weekday: "long", month: "short", day: "numeric" });
const dShort = new Intl.DateTimeFormat(undefined, { month: "short", day: "numeric" });

function money(v){ if(v==null) return "—"; if(v>=1e6) return "€"+(v/1e6).toFixed(v>=10e6?0:1)+"M"; return "€"+Math.round(v/1e3)+"K"; }
function cd(utc){ const d=new Date(utc)-new Date(); if(d<=0) return null;
  const h=Math.floor(d/3.6e6),m=Math.floor(d%3.6e6/6e4),s=Math.floor(d%6e4/1e3);
  return h>0 ? h+"h "+String(m).padStart(2,"0")+"m" : m+"m "+String(s).padStart(2,"0")+"s"; }
function initials(n){ const p=(n||"").trim().split(" ").filter(Boolean);
  return p.length>1 ? (p[0][0]+p[p.length-1][0]).toUpperCase() : (p[0]||"?").slice(0,2).toUpperCase(); }

// Country name -> flag emoji (WC2026 nations). Falls back to a neutral flag,
// never a broken image.
const FLAGS = {
  "Argentina":"🇦🇷","Australia":"🇦🇺","Austria":"🇦🇹","Belgium":"🇧🇪","Bosnia-Herzegovina":"🇧🇦",
  "Brazil":"🇧🇷","Canada":"🇨🇦","Cape Verde":"🇨🇻","Colombia":"🇨🇴","Croatia":"🇭🇷",
  "Czech Republic":"🇨🇿","Czechia":"🇨🇿","Democratic Republic of the Congo":"🇨🇩","Ecuador":"🇪🇨",
  "Egypt":"🇪🇬","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","France":"🇫🇷","Germany":"🇩🇪","Ghana":"🇬🇭","Iran":"🇮🇷",
  "Ivory Coast":"🇨🇮","Japan":"🇯🇵","Jordan":"🇯🇴","Mexico":"🇲🇽","Morocco":"🇲🇦",
  "Netherlands":"🇳🇱","New Zealand":"🇳🇿","Norway":"🇳🇴","Panama":"🇵🇦","Paraguay":"🇵🇾",
  "Portugal":"🇵🇹","Saudi Arabia":"🇸🇦","Senegal":"🇸🇳","South Africa":"🇿🇦","South Korea":"🇰🇷",
  "Spain":"🇪🇸","Sweden":"🇸🇪","Switzerland":"🇨🇭","Tunisia":"🇹🇳","Uruguay":"🇺🇾",
  "USA":"🇺🇸","United States":"🇺🇸","Uzbekistan":"🇺🇿"
};
function flag(name){ return FLAGS[name] || "🏳️"; }

// ---- Hardcoded knockout bracket (FIFA official wiring, keyed to the R16 ties) ----
// Each R16 tie is a "slot" identified by its two teams. QF/SF/Final slots are
// defined by which earlier slots feed them. We resolve each slot to either the
// actual winner (from finished-match data) or the pair of possible teams.
const BRACKET = {
  // Round of 16 slots: [teamA, teamB]  (order per FIFA match numbers)
  r16: {
    m89: ["Paraguay","France"], m90: ["Canada","Morocco"],
    m91: ["Brazil","Norway"],   m92: ["Mexico","England"],
    m93: ["Portugal","Spain"],  m94: ["USA","Belgium"],
    m95: ["Argentina","Egypt"], m96: ["Switzerland","Colombia"]
  },
  // Quarter-finals: each QF fed by two R16 slots
  qf: { m97:["m89","m90"], m98:["m93","m94"], m99:["m91","m92"], m100:["m95","m96"] },
  // Semi-finals: each fed by two QFs
  sf: { m101:["m97","m98"], m102:["m99","m100"] },
  // Final: fed by two SFs
  final: { m104:["m101","m102"] }
};
// football-data may spell USA as "United States" — normalize for matching.
function normTeam(n){ return n==="United States"?"USA":n; }

// Find the winner of an R16 tie from finished-match data, else null.
function r16Winner(pair){
  const [a,b] = pair;
  const all = [...(data.finished||[]),...(data.upcoming||[])];
  for(const m of all){
    const h=normTeam(m.home), aw=normTeam(m.away);
    if((h===a&&aw===b)||(h===b&&aw===a)){
      if(m.status!=="FINISHED" || m.homeScore==null) return null;
      // winner by score (penalties not in this data — score is full-time)
      if(m.homeScore>m.awayScore) return h;
      if(m.awayScore>m.homeScore) return aw;
      return null; // draw without decisive score in data
    }
  }
  return null;
}
// Resolve a slot key to {resolved: teamName} or {possible: [teams...]}.
function resolveSlot(key){
  if(BRACKET.r16[key]){
    const w = r16Winner(BRACKET.r16[key]);
    return w ? {resolved:w} : {possible: BRACKET.r16[key]};
  }
  const feeders = (BRACKET.qf[key]||BRACKET.sf[key]||BRACKET.final[key]);
  if(!feeders) return {possible:[]};
  const parts = feeders.map(resolveSlot);
  // if both feeders resolved, this slot's contenders are those two winners
  const poss = [];
  for(const p of parts){ if(p.resolved) poss.push(p.resolved); else poss.push(...p.possible); }
  // a slot is "resolved" as a matchup only when both feeders resolved
  return {possible: poss, sides: parts};
}

// Human-readable stage names
const STAGE_NAMES = {
  "GROUP_STAGE":"Groups", "LAST_32":"Last 32", "ROUND_OF_32":"Last 32",
  "ROUND_OF_16":"Last 16", "LAST_16":"Last 16", "QUARTER_FINALS":"Quarter-finals",
  "QUARTER_FINAL":"Quarter-finals", "SEMI_FINALS":"Semi-finals", "SEMI_FINAL":"Semi-finals",
  "THIRD_PLACE":"Third place", "FINAL":"Final"
};
const STAGE_ORDER = ["ROUND_OF_32","LAST_32","ROUND_OF_16","LAST_16","QUARTER_FINALS","SEMI_FINALS","THIRD_PLACE","FINAL"];
function stageName(s){ return STAGE_NAMES[s] || (s? s.replaceAll("_"," ").toLowerCase() : ""); }

function lineOf(pos){ const p=(pos||"").toLowerCase();
  if(p.includes("goal")) return 0;
  if(p.includes("def")||p.includes("back")) return 1;
  if(p.includes("mid")) return 2;
  return 3; }
const LINE_LABELS = ["Goalkeeper","Defence","Midfield","Attack"];

async function load(){
  loadState();   // restore last tab + team filter
  try { data = await (await fetch("data/matches.json?t="+Date.now())).json(); }
  catch(e){ document.getElementById("view").innerHTML =
    "<p class='notice'>Match data isn't loading. If you opened the file directly, serve it with <code>python -m http.server</code> from the <code>site</code> folder.</p>"; return; }
  try { squads = (await (await fetch("data/squads.json?t="+Date.now())).json()).teams; } catch(e){ squads=null; }
  try { standings = (await (await fetch("data/standings.json?t="+Date.now())).json()).standings; } catch(e){ standings=null; }
  if(data.sample) document.getElementById("notice-slot").innerHTML =
    "<p class='notice'>Showing sample data. Run the build to load real fixtures.</p>";
  // reflect restored tab in the buttons
  ["upcoming","finished","tournament"].forEach(x=> {
    const btn=document.getElementById("tab-"+x); if(btn) btn.setAttribute("aria-selected", x===tab); });
  // freshness timestamp from the data's generatedAt
  if(data.generatedAt){
    const upd = new Date(data.generatedAt);
    const el = document.getElementById("updated");
    if(el) el.textContent = "Updated " + new Intl.DateTimeFormat(undefined,{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}).format(upd);
  }
  render(); timers();
}
function timers(){
  if(tick) clearInterval(tick);
  tick = setInterval(()=>document.querySelectorAll("[data-cd]").forEach(el=>{
    const t=cd(el.getAttribute("data-cd")); el.textContent = t? t : "kickoff"; }),1000);
  if(poll) clearInterval(poll);
  poll = setInterval(async()=>{ if((data.upcoming||[]).some(m=>m.status==="IN_PLAY"||m.status==="PAUSED")){
    try{ data=await (await fetch("data/matches.json?t="+Date.now())).json(); render(); }catch(e){} } },60000);
}
function show(t){ tab=t; openId=null; saveState();
  ["upcoming","finished","tournament"].forEach(x=> document.getElementById("tab-"+x).setAttribute("aria-selected", x===t));
  render(); }
function toggle(id){ openId = openId===id? null : id; render(); }
function pickTeam(id, side){ openTeam[id]=side; render(); }
function pickMode(id, mode){ openMode[id]=mode; render(); }

function pitchView(sq){
  const byLine=[[],[],[],[]];
  for(const p of sq.players) byLine[lineOf(p.position)].push(p);
  const pick=[ byLine[0].slice(0,1), byLine[1].slice(0,4), byLine[2].slice(0,4), byLine[3].slice(0,3) ];
  const lines = pick.map(line => "<div class='line'>" + line.map(p =>
    "<div class='pl'><div class='badge'>"+initials(p.name)+"</div>" +
    "<div class='nm'>"+p.name+"</div><div class='val'>"+money(p.value_eur)+"</div>" +
    (p.club? "<div class='club'>"+p.club+"</div>":"") + "</div>").join("") + "</div>").join("");
  return "<div class='pitch'><div class='halfway'></div><div class='center-circle'></div>"+lines+"</div>";
}
function listView(sq){
  // full squad, grouped by line, full names + full club names (no truncation)
  const rows = sq.players.map(p =>
    "<tr><td><div class='p-nm'>"+p.name+"</div><div class='p-pos'>"+(p.position||"")+"</div></td>" +
    "<td class='p-club'>"+(p.club||"—")+"</td>" +
    "<td class='r p-val'>"+money(p.value_eur)+"</td></tr>").join("");
  return "<div class='plist'><table><thead><tr><th>Player</th><th>Club</th><th class='r'>Value</th></tr></thead>" +
    "<tbody>"+rows+"</tbody></table></div>";
}
function detail(m){
  const side = openTeam[m.id] || "home";
  const mode = openMode[m.id] || "pitch";
  const teamName = side==="home"? m.home : m.away;
  const sq = squads && squads[teamName];
  const body = !sq ? "<div class='pitch-note'>Squad data appears after the next build.</div>"
    : (mode==="pitch" ? pitchView(sq) : listView(sq)) +
      "<div class='squadmeta'><span>Squad value <b>"+money(sq.players.reduce((s,p)=>s+(p.value_eur||0),0))+"</b></span>" +
      "<span>"+sq.matched+"/"+sq.squadSize+" valued</span></div>";
  // squad-value comparison bar (both sides), when both squads are known
  const hv = squads && squads[m.home] ? squads[m.home].players.reduce((s,p)=>s+(p.value_eur||0),0) : 0;
  const av = squads && squads[m.away] ? squads[m.away].players.reduce((s,p)=>s+(p.value_eur||0),0) : 0;
  let compare = "";
  if(hv || av){
    const tot = hv+av || 1, hpct = Math.round(hv/tot*100);
    // Mismatch meter: how lopsided is this tie by squad value?
    const hi = Math.max(hv,av), lo = Math.min(hv,av);
    const ratio = lo>0 ? hi/lo : 0;
    let mismatch = "";
    if(ratio >= 1.5 && lo > 0){
      const favUsesFlag = hv>av ? flag(m.home) : flag(m.away);
      const favName = hv>av ? m.home : m.away;
      const label = ratio>=3 ? "Big mismatch" : "Favourite";
      mismatch = "<div class='mismatch'>"+favUsesFlag+" <b>"+favName+"</b> — "+ratio.toFixed(1)+"× the squad value</div>";
    } else if(lo>0){
      mismatch = "<div class='mismatch even'>Evenly matched by squad value</div>";
    }
    compare = "<div class='vbar-wrap'><div class='vbar-heads'>" +
      "<span>"+flag(m.home)+" "+money(hv)+"</span><span>"+money(av)+" "+flag(m.away)+"</span></div>" +
      "<div class='vbar'><div class='vbar-h' style='width:"+hpct+"%'></div></div>" + mismatch + "</div>";
  }

  return "<div class='detail'>" +
    "<div class='detail-head'>" +
      "<div class='teamtabs'>" +
        "<button class='teamtab' aria-selected='"+(side==='home')+"' onclick=\"pickTeam("+m.id+",'home')\">"+flag(m.home)+" "+m.home+"</button>" +
        "<button class='teamtab' aria-selected='"+(side==='away')+"' onclick=\"pickTeam("+m.id+",'away')\">"+flag(m.away)+" "+m.away+"</button>" +
      "</div><div class='venue'>"+(m.venue||"")+"</div>" +
    "</div>" + compare +
    "<div class='switchrow'>" +
      "<div class='pitch-note' style='padding:0'>Most valuable squad players — not a confirmed lineup</div>" +
      "<div class='viewtabs'>" +
        "<button class='viewtab' aria-selected='"+(mode==='pitch')+"' onclick=\"pickMode("+m.id+",'pitch')\">Pitch</button>" +
        "<button class='viewtab' aria-selected='"+(mode==='list')+"' onclick=\"pickMode("+m.id+",'list')\">List</button>" +
      "</div>" +
    "</div>" + body + "</div>";
}

function renderMatches(){
  let list = data[tab] || [];
  if(teamFilter) list = list.filter(m => m.home===teamFilter || m.away===teamFilter);
  const el = document.getElementById("view");

  // team filter bar — built from all teams appearing in the data
  const allTeams = [...new Set([...(data.upcoming||[]),...(data.finished||[])]
    .flatMap(m=>[m.home,m.away]).filter(t=>t&&t!=="TBD"))].sort();
  let filterBar = "<div class='filterbar'><span class='filter-lbl'>Team</span>" +
    "<select class='team-select' onchange='setFilter(this.value)'>" +
    "<option value=''>All teams</option>" +
    allTeams.map(t=>"<option value='"+t+"' "+(t===teamFilter?"selected":"")+">"+flag(t)+" "+t+"</option>").join("") +
    "</select>" + (teamFilter? "<button class='clear-filter' onclick=\"setFilter('')\">clear</button>":"") + "</div>";

  if(!list.length){ el.innerHTML = filterBar + "<p class='notice'>No matches"+(teamFilter?" for "+teamFilter:"")+" in this window.</p>"; return; }
  let html=filterBar, day="";
  for(const m of list){
    const ko = new Date(m.utcDate);
    const dl = dFmt.format(ko);
    if(dl!==day){ html += "<div class='daylabel'>"+dl+"</div>"; day=dl; }
    const live = m.status==="IN_PLAY"||m.status==="PAUSED";
    const H = flag(m.home)+" "+m.home, A = m.away+" "+flag(m.away);
    let mid;
    if(live) mid = H+" <span class='score'>"+(m.homeScore??0)+"–"+(m.awayScore??0)+"</span> "+A+" <span class='livewrap'><span class='dot'></span>LIVE</span>";
    else if(tab==="finished") mid = H+" <span class='score'>"+m.homeScore+"–"+m.awayScore+"</span> "+A;
    else mid = H+" <span class='vs'>v</span> "+A;
    let sub = stageName(m.stage);
    if(tab==="upcoming" && !live){ const t=cd(m.utcDate); if(t) sub += " · <span class='cd' data-cd='"+m.utcDate+"'>"+t+"</span>"; }
    const label = tab==="finished"? "FT" : (live? "LIVE" : "KO");
    html += "<button class='match' onclick='toggle("+m.id+")'>" +
      "<div class='clock'>"+tFmt.format(ko)+"<small>"+label+"</small></div>" +
      "<div><div class='fixture'>"+mid+"</div><div class='sub'>"+sub+"</div></div>" +
      "<div class='chev'>"+(openId===m.id?"▾":"▸")+"</div></button>";
    if(openId===m.id) html += detail(m);
  }
  el.innerHTML = html;
}

// Tournament tab with sub-tabs: Groups + all knockout rounds (always shown).
function renderTournament(){
  const el = document.getElementById("view");

  // Fixed round list — always present so users see the full tournament shape.
  const rounds = [
    {key:"groups", label:"Groups"},
    {key:"r16",    label:"Last 16"},
    {key:"qf",     label:"Quarter-finals"},
    {key:"sf",     label:"Semi-finals"},
    {key:"final",  label:"Final"}
  ];
  const haveGroups = standings && standings.length;
  const subs = haveGroups ? rounds : rounds.filter(r=>r.key!=="groups");
  if(!subRound || !subs.find(s=>s.key===subRound)) subRound = "r16";

  let html = "<div class='subtabs'>" + subs.map(s =>
    "<button class='subtab' aria-selected='"+(s.key===subRound)+"' onclick=\"setRound('"+s.key+"')\">"+s.label+"</button>"
  ).join("") + "</div>";

  if(subRound==="groups"){
    for(const g of standings){
      const rows = g.table||[];
      html += "<div class='grp'><h3>"+(g.group? g.group.replaceAll("_"," "):"Table")+"</h3>" +
        "<table class='st'><thead><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead><tbody>" +
        rows.map((r,i)=>"<tr class='"+(i<2?"qual":"")+"'><td>"+flag(r.team.name)+" "+r.team.name+"</td><td>"+r.playedGames+"</td><td>"+r.won+"</td><td>"+r.draw+"</td><td>"+r.lost+"</td><td>"+r.goalDifference+"</td><td class='pts'>"+r.points+"</td></tr>").join("") +
        "</tbody></table></div>";
    }
    el.innerHTML = html; return;
  }

  // Knockout rounds from the bracket structure.
  const slotKeys = subRound==="r16" ? Object.keys(BRACKET.r16)
    : subRound==="qf" ? Object.keys(BRACKET.qf)
    : subRound==="sf" ? Object.keys(BRACKET.sf)
    : Object.keys(BRACKET.final);

  // helper: render one side as either a firm team or a full vertical list of possibles
  const sideBlock = (part)=>{
    if(part.resolved)
      return "<div class='side-block firm'><div class='side-team'>"+flag(part.resolved)+" "+part.resolved+"</div></div>";
    const teams = part.possible||[];
    if(!teams.length) return "<div class='side-block tbd'><div class='side-team'>To be decided</div></div>";
    return "<div class='side-block maybe'>" +
      "<div class='side-cap'>"+teams.length+" possible</div>" +
      teams.map(t=>"<div class='side-team'>"+flag(t)+" "+t+"</div>").join("") +
    "</div>";
  };

  for(const key of slotKeys){
    if(subRound==="r16"){
      const pair = BRACKET.r16[key];
      const fx = findFixture(pair);
      if(fx){
        const done = fx.status==="FINISHED";
        const result = done ? "<span class='rs'>"+fx.homeScore+"–"+fx.awayScore+"</span>"
          : "<span class='dt'>"+dShort.format(new Date(fx.utcDate))+" "+tFmt.format(new Date(fx.utcDate))+"</span>";
        html += "<div class='ko'><span class='teams'>"+flag(fx.home)+" "+fx.home+" <span class='vs'>v</span> "+fx.away+" "+flag(fx.away)+"</span>"+result+"</div>";
      } else {
        html += "<div class='ko'><span class='teams'>"+flag(pair[0])+" "+pair[0]+" <span class='vs'>v</span> "+pair[1]+" "+flag(pair[1])+"</span></div>";
      }
      continue;
    }
    // QF / SF / Final: two sides, each possibly a list of contenders
    const feeders = (BRACKET.qf[key]||BRACKET.sf[key]||BRACKET.final[key]);
    const sides = feeders.map(resolveSlot);
    const bothFirm = sides.every(s=>s.resolved);
    html += "<div class='bracket-card"+(bothFirm?" firm-card":"")+"'>" +
      "<div class='bracket-status'>"+(bothFirm? "Confirmed" : "Projected — winners advance here")+"</div>" +
      "<div class='bracket-sides'>" +
        sideBlock(sides[0]) +
        "<div class='bracket-vs'>vs</div>" +
        sideBlock(sides[1]) +
      "</div>" +
    "</div>";
  }
  el.innerHTML = html;
}
// Find a real fixture in the data matching a team pair.
function findFixture(pair){
  const [a,b]=pair; const all=[...(data.finished||[]),...(data.upcoming||[])];
  return all.find(m=>{ const h=normTeam(m.home),aw=normTeam(m.away);
    return (h===a&&aw===b)||(h===b&&aw===a); });
}
function setRound(k){ subRound = k; render(); }
function setFilter(t){ teamFilter = t || null; openId=null; saveState(); render(); }

// Share: uses the native share sheet on mobile, falls back to copying the link.
async function shareSite(){
  const url = location.href, title = "World Cup 2026 · Matchday";
  try {
    if(navigator.share){ await navigator.share({title, url}); return; }
    await navigator.clipboard.writeText(url);
    const btn = document.querySelector(".share-btn");
    if(btn){ const o=btn.textContent; btn.textContent="Link copied"; setTimeout(()=>btn.textContent=o,1600); }
  } catch(e){ /* user cancelled share — ignore */ }
}

function render(){ tab==="tournament"? renderTournament() : renderMatches(); }
load();
</script>
